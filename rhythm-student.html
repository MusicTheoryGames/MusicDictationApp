<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Student - Music Dictation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(140deg, #2d3436 0%, #636e72 100%);
            min-height: 100vh;
            /* Allow the page to scroll. Previously height:100vh + overflow:hidden
               clipped the answer staff below the fold on shorter desktop windows,
               making the "whiteboard" disappear entirely. */
            overflow-y: auto;
            color: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .login-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #2d3436, #636e72);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .game-area {
            display: none;
            flex: 1;
            /* Let the body scroll instead of a nested scroll container, so the
               answer staff is always reachable on short windows. */
            overflow: visible;
        }

        .game-area.active {
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .rhythm-bank {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }

        .rhythm-bank h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .rhythm-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            /* Cap the bank so it can't push the answer staff off-screen; it
               scrolls internally if there are more tiles than fit. */
            max-height: 28vh;
            overflow-y: auto;
        }

        .rhythm-tile {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 18px;
            padding: 0;
            cursor: grab;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                0 1px 2px rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .rhythm-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .rhythm-tile svg {
            padding: 0 !important;
            margin: 0 !important;
        }

        .rhythm-tile:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(255, 255, 255, 0.15),
                0 2px 8px rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .rhythm-tile.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .answer-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            flex: 1;
            min-height: 0;
        }

        .answer-area h3 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .measure-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .answer-staff {
            background: white;
            border-radius: 8px;
            padding: 20px 50px 20px 20px;
            position: relative;
            width: min(900px, 96vw);
            height: 120px;
        }

        .answer-staff-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        .staff-container {
            position: relative;
            height: 80px;
            margin-top: 10px;
        }

        .staff-lines {
            position: absolute;
            width: 100%;
            height: 20px;
            top: 30px;
        }

        .staff-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: #333;
            top: 9px; /* Single line in the middle for rhythm notation */
        }

        .percussion-clef {
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            z-index: 5;
        }

        /* Time signature at the left of the answer staff. Centered vertically on
           the staff line (top:39px = staff-lines top 30 + staff-line top 9), so
           the line passes between the two stacked numbers. */
        .answer-time-sig {
            position: absolute;
            left: 2px;
            top: 35px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.72;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 700;
            font-size: 30px;
            color: #333;
            z-index: 5;
        }

        .beat-divisions {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .beat-drop-zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Only show bar line in the middle (after beat 4) */
        .beat-drop-zone[data-beat="4"] {
            border-right: 3px solid #333; /* Bar line between measures */
            margin-right: 15px; /* Add space after bar line */
        }

        /* Add thick line to the right of the last bar to make double bar */
        .beat-drop-zone[data-beat="4"][data-measure="2"]::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #333; /* Thick line to the right */
        }

        /* Beat indicators inside white area */
        .beat-drop-zone::before {
            content: attr(data-beat);
            position: absolute;
            /* Below the staff so stems-down notes don't cover the numbers. */
            bottom: -10px;
            /* Anchored to the beat ONSET (cell's left edge) so the number sits
               where the beat actually starts and notes line up under it. */
            left: 0;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #ddd;
            font-weight: 300;
            z-index: 0;
        }

        .beat-drop-zone.drag-over {
            background: rgba(255, 107, 107, 0.1);
        }

        .beat-drop-zone.filled {
            background: rgba(76, 175, 80, 0.1);
        }

        .beat-drop-zone.continuation {
            background: rgba(76, 175, 80, 0.1); /* Green instead of yellow */
        }

        .beat-drop-zone.revealed {
            background: rgba(52, 152, 219, 0.1);
        }

        .beat-notation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* A dropped rhythm PNG. Width is set inline as (beats * 100%) of one
           responsive beat cell, so it scales with the screen and spans its
           continuation beats. object-fit keeps the aspect ratio; object-position
           pins the noteheads onto the single staff line. */
        .placed-note {
            position: absolute;
            left: 0;
            /* width is set inline to (beats * 100%) to span the pattern's beats;
               assets are width-proportional to beats, so height (auto) is identical
               for every pattern at any screen size. Anchored left so inner notes
               align to their beats. */
            top: 47%;
            transform: translateY(-50%);
            height: auto;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
            z-index: 2;
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .feedback {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
        }

        .feedback.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
        }

        .feedback.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }

        .feedback.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
        }


        /* Tablet Layout */
        @media (max-width: 1024px) {
            .answer-staff {
                width: 95vw;
                max-width: 800px;
                padding: 15px 35px 15px 15px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                padding: 15px;
            }

            .rhythm-tile {
                min-height: 100px;
                padding: 0;
            }
        }

        /* Landscape orientation hint */
        @media (max-width: 768px) and (orientation: portrait) {
            .game-area::before {
                content: "💡 Tip: Rotate to landscape for better experience";
                display: block;
                text-align: center;
                background: rgba(255, 255, 255, 0.1);
                padding: 8px;
                border-radius: 8px;
                margin-bottom: 10px;
                font-size: 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        }

        /* Mobile Layout - Large phones and small tablets */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
                margin: 15px 0;
            }

            .answer-staff {
                width: 95vw;
                max-width: 700px;
                padding: 12px 25px 12px 12px;
                height: 100px;
            }

            .staff-container {
                height: 70px;
            }

            .beat-drop-zone {
                min-height: 70px;
            }

            .beat-drop-zone::before {
                font-size: 1rem;
                bottom: 3px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 10px;
            }

            .rhythm-tile {
                min-height: 80px;
                padding: 0;
                font-size: 0.7rem;
            }

            .remove-btn {
                width: 20px;
                height: 20px;
                font-size: 10px;
                top: -10px;
                right: -10px;
            }

            /* Touch-friendly interactions */
            .rhythm-tile:active {
                transform: scale(0.98);
                background: rgba(255, 255, 255, 1);
            }

            .beat-drop-zone:active {
                background: rgba(76, 175, 80, 0.15);
            }
        }

        /* Small Mobile Phones */
        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.3rem;
                margin: 10px 0;
            }

            .answer-staff {
                width: 98vw;
                max-width: none;
                padding: 10px 20px 10px 10px;
                height: 90px;
                margin: 0 auto;
            }

            .staff-container {
                height: 60px;
            }

            .beat-drop-zone {
                min-height: 60px;
            }

            .beat-drop-zone::before {
                font-size: 0.9rem;
                bottom: 2px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 8px;
            }

            .rhythm-tile {
                min-height: 70px;
                padding: 0;
                font-size: 0.65rem;
            }

            .remove-btn {
                width: 18px;
                height: 18px;
                font-size: 9px;
                top: -9px;
                right: -9px;
            }

            /* Smaller VexFlow notation on mobile */
            .beat-notation svg {
                transform: translateX(-50%) scale(1.1) !important;
            }
        }

        /* Very small phones */
        @media (max-width: 360px) {
            .answer-staff {
                width: 99vw;
                padding: 8px 15px 8px 8px;
                height: 80px;
            }

            .staff-container {
                height: 55px;
            }

            .beat-drop-zone {
                min-height: 55px;
            }

            .beat-drop-zone::before {
                font-size: 0.8rem;
                bottom: 1px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
                padding: 6px;
            }

            .rhythm-tile {
                min-height: 40px;
                font-size: 0.6rem;
            }

            /* Even smaller notation for tiny screens */
            .beat-notation svg {
                transform: translateX(-50%) scale(1.0) !important;
            }
        }
    </style>
    <!-- Suite theme skins (cosmetic only — does not affect the notation engine) -->
    <link rel="stylesheet" href="suite-theme.css">
</head>
<body>
    <div class="header">
        <h1>🥁 Rhythm Dictation - Student</h1>
    </div>

    <!-- Login Form -->
    <div class="login-form" id="loginForm">
        <h2 style="text-align: center; margin-bottom: 20px;">Join Rhythm Session</h2>
        <div class="form-group">
            <label for="studentName">Your Name:</label>
            <input type="text" id="studentName" placeholder="Enter your name" value="Test Student" required>
        </div>
        <div class="form-group">
            <label for="roomCode">Room Code:</label>
            <input type="text" id="roomCode" placeholder="Enter room code" value="TEST123" required>
        </div>
        <button class="btn-login" id="joinBtn">Join Session</button>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="status-bar">
            <div>Connected to Room: <strong id="connectedRoom">-</strong></div>
            <div>Status: <span id="connectionStatus">Connected</span></div>
        </div>

        <div class="rhythm-bank">
            <h3>Rhythm Bank</h3>
            <div class="rhythm-tiles" id="rhythmTiles">
                <!-- Rhythm tiles will be populated by JavaScript -->
            </div>
        </div>

        <div class="answer-area">
            <h3>Your Answer</h3>
            <div id="measureContainer">
                <!-- Measures will be populated by JavaScript -->
            </div>
            <div id="feedback"></div>
        </div>
    </div>

    <script type="module" src="rhythm-student.js?v=20260626d"></script>
    <script src="suite-theme.js"></script>
</body>
</html>
