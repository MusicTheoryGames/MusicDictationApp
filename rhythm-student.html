<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Student - Music Dictation</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .login-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .rhythm-bank {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .rhythm-bank h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .rhythm-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .rhythm-tile {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 5px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rhythm-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .rhythm-tile.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .answer-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .answer-area h3 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .measure-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .answer-staff {
            background: white;
            border-radius: 8px;
            padding: 20px 50px 20px 20px;
            position: relative;
            width: 900px;
            height: 120px;
        }

        .answer-staff-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        .staff-container {
            position: relative;
            height: 80px;
            margin-top: 10px;
        }

        .staff-lines {
            position: absolute;
            width: 100%;
            height: 20px;
            top: 30px;
        }

        .staff-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #333;
            top: 9px; /* Single line in the middle for rhythm notation */
        }

        .percussion-clef {
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            z-index: 5;
        }

        .beat-divisions {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .beat-drop-zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Only show bar line in the middle (after beat 4) */
        .beat-drop-zone[data-beat="4"] {
            border-right: 3px solid #333; /* Bar line between measures */
            margin-right: 15px; /* Add space after bar line */
        }

        /* Add thick line to the right of the last bar to make double bar */
        .beat-drop-zone[data-beat="4"][data-measure="2"]::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #333; /* Thick line to the right */
        }

        /* Beat indicators inside white area */
        .beat-drop-zone::before {
            content: attr(data-beat);
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #ddd;
            font-weight: 300;
            z-index: 0;
        }

        .beat-drop-zone.drag-over {
            background: rgba(255, 107, 107, 0.1);
        }

        .beat-drop-zone.filled {
            background: rgba(76, 175, 80, 0.1);
        }

        .beat-drop-zone.continuation {
            background: rgba(76, 175, 80, 0.1); /* Green instead of yellow */
        }

        .beat-drop-zone.revealed {
            background: rgba(52, 152, 219, 0.1);
        }

        .beat-notation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .feedback {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
        }

        .feedback.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
        }

        .feedback.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }

        .feedback.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
        }


        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .drop-zones {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .rhythm-tiles {
                grid-template-columns: repeat(2, 1fr);
            }

            .drop-zone {
                padding: 20px 8px;
                min-height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥁 Rhythm Dictation - Student</h1>
    </div>

    <!-- Login Form -->
    <div class="login-form" id="loginForm">
        <h2 style="text-align: center; margin-bottom: 20px;">Join Rhythm Session</h2>
        <div class="form-group">
            <label for="studentName">Your Name:</label>
            <input type="text" id="studentName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
            <label for="roomCode">Room Code:</label>
            <input type="text" id="roomCode" placeholder="Enter room code" required>
        </div>
        <button class="btn-login" id="joinBtn">Join Session</button>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="status-bar">
            <div>Connected to Room: <strong id="connectedRoom">-</strong></div>
            <div>Status: <span id="connectionStatus">Connected</span></div>
        </div>

        <div class="rhythm-bank">
            <h3>Rhythm Bank</h3>
            <div class="rhythm-tiles" id="rhythmTiles">
                <!-- Rhythm tiles will be populated by JavaScript -->
            </div>
        </div>

        <div class="answer-area">
            <h3>Your Answer</h3>
            <div id="measureContainer">
                <!-- Measures will be populated by JavaScript -->
            </div>
            <div id="feedback"></div>
        </div>
    </div>

    <script src="rhythm-student.js"></script>
</body>
</html>
