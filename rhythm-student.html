<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Student - Music Dictation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(140deg, #2d3436 0%, #636e72 100%);
            min-height: 100vh;
            /* Allow the page to scroll. Previously height:100vh + overflow:hidden
               clipped the answer staff below the fold on shorter desktop windows,
               making the "whiteboard" disappear entirely. */
            overflow-y: auto;
            color: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            /* Consistent header height across themes (Arcade's pixel font is
               short and was shifting the whole layout up vs the other skins). */
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .login-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #2d3436, #636e72);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .game-area {
            display: none;
            flex: 1;
            /* Let the body scroll instead of a nested scroll container, so the
               answer staff is always reachable on short windows. */
            overflow: visible;
        }

        .game-area.active {
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .rhythm-bank {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }

        .rhythm-bank h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .rhythm-tiles {
            /* Flex-wrap with FIXED-width tiles so each tile is always the same
               size no matter how many figures the level shows (2 or 18). */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            /* Cap the bank so it can't push the answer staff off-screen; it
               scrolls internally if there are more tiles than fit. */
            max-height: 28vh;
            overflow-y: auto;
        }

        .rhythm-tile {
            width: 150px;          /* fixed size — consistent across all levels */
            flex: 0 0 150px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 18px;
            padding: 0;
            cursor: grab;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                0 1px 2px rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .rhythm-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .rhythm-tile svg {
            padding: 0 !important;
            margin: 0 !important;
        }

        .rhythm-tile:hover {
            /* No movement/zoom — each theme supplies a colored outline on hover. */
            border-color: rgba(255, 255, 255, 0.4);
        }

        .rhythm-tile.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .answer-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            /* Size to the staff's content — no flex-grow dead space. */
            flex: 0 0 auto;
        }

        .answer-area h3 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .measure-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .answer-staff {
            background: white;
            border-radius: 8px;
            padding: 20px 50px 20px 20px;
            position: relative;
            /* Fill the width like the rhythm bank (capped so beat cells/notes
               don't get oversized on ultra-wide screens). Horizontal only —
               vertical staff/time-sig tuning is untouched. */
            width: 100%;
            max-width: 1500px;
            /* Multi-line: the panel sizes to its stacked rows. Each .staff-container
               row carries the responsive height (moved from here) so a single row
               keeps its exact look while extra rows just add height. */
        }

        .answer-staff-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        .staff-container {
            position: relative;
            /* Each staff LINE carries the responsive height (was on .answer-staff),
               so one row keeps its original look and extra rows stack below it. */
            height: clamp(140px, 14vw, 210px);
            margin-top: 0;
        }

        /* Vertical gap between stacked staff lines (rows 2+). The first row has no
           gap so a single-row staff is pixel-identical to before. */
        .staff-container + .staff-container {
            margin-top: 30px;
        }

        .staff-lines {
            position: absolute;
            width: 100%;
            top: 0;
            height: 100%;     /* full-height wrapper so the line anchors reliably */
        }

        .staff-line {
            position: absolute;
            width: 100%;
            height: 2px;       /* clearly visible */
            background: #333;
            top: 44%;          /* upper-middle; stems + numbers fit below */
        }

        .percussion-clef {
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            z-index: 5;
        }

        /* Time signature at the left of the answer staff. Centered vertically on
           the staff line (top:39px = staff-lines top 30 + staff-line top 9), so
           the line passes between the two stacked numbers. */
        .answer-time-sig {
            position: absolute;
            left: 2px;
            top: 44%;
            /* -50% centers the GAP between the two numbers on the staff line, so
               the line sits in clear space for ANY digit (not at a box edge,
               which clipped full-height glyphs like 8). */
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Each number in its own tight box, with a generous gap so the staff
               line passes through clear space between ANY two digits (a full
               glyph like 8 was overflowing a tight line-box into the line). */
            line-height: 0.8;
            gap: 0.26em;
            font-family: Georgia, 'Times New Roman', serif;
            font-variant-numeric: lining-nums tabular-nums;
            font-feature-settings: "lnum" 1, "tnum" 1;
            font-weight: 700;
            /* ~2x larger, scaling with the staff. Vertically centered on the
               staff line (top:44% + translateY(-50%)) so the line stays exactly
               between the two numbers. */
            font-size: clamp(34px, 4.6vw, 62px);
            color: #333;
            z-index: 5;
        }

        /* Inline time signature for CHANGING-METER mode — a flex slot in the cell
           row, shown at the start of each measure where the meter changes (Hall's
           convention). Numbers straddle the staff line like the leading time sig. */
        .answer-ts-inline {
            flex: 0 0 auto;
            align-self: stretch;
            position: relative;
            min-width: 1.5em;
            margin: 0 0.3em 0 0.08em;
            font-family: Georgia, 'Times New Roman', serif;
            font-variant-numeric: lining-nums tabular-nums;
            font-feature-settings: "lnum" 1, "tnum" 1;
            font-weight: 700;
            font-size: clamp(30px, 4vw, 52px);
            color: var(--bar-ink, #333);
            z-index: 5;
        }
        /* Stack the two numbers and center the GAP on the staff line (top:44% +
           translateY(-50%)) — identical to the leading .answer-time-sig so they
           line up exactly. */
        .answer-ts-inline .ts-stack {
            position: absolute;
            left: 50%;
            top: 44%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.8;
            gap: 0.24em;
        }

        /* Top-of-measure row: the measure number, then (at a simple<->compound
           change) the beat-equivalence image directly to its right. Anchored
           top-left of the measure's first element — consistent and countable. */
        .ts-top {
            position: absolute;
            top: 1px;
            left: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            z-index: 7;
            pointer-events: none;
        }
        .ts-top .mnum {
            font-size: 10px;
            font-weight: 700;
            color: var(--bar-ink, #333);
            opacity: 0.55;
        }
        .ts-equiv {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ts-equiv img { height: 26px; width: auto; display: block; }
        .ts-equiv b { font: 700 16px Georgia, serif; color: var(--bar-ink, #333); }

        .beat-divisions {
            position: absolute;
            /* Anchor to both edges (not width:100%) so the inline margin-left/right
               shrink the beat row to fit — otherwise width:100% + margin-left
               pushes the last cell + double bar off the right edge. */
            left: 0;
            right: 0;
            height: 100%;
            display: flex;
        }

        .beat-drop-zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Bar line between measures — last cell of each measure EXCEPT the final
           double bar. Uses .final-cell (set only on the very last cell of the last
           row) so each row's own trailing measure still gets a normal bar line.
           Colour comes from --bar-ink (each theme sets it to its staff ink). */
        .beat-drop-zone.measure-end:not(.final-cell) {
            /* Bar line between measures. No margin (border is inside the cell via
               box-sizing) so EVERY cell is the exact same width and bar lines
               stack vertically across stacked lines. */
            border-right: 3px solid var(--bar-ink, #333);
        }
        /* Final cell carries a matching (invisible) border so its row's cells are
           the exact same width as every other row -> bar lines align perfectly. */
        .beat-drop-zone.final-cell {
            border-right: 3px solid transparent;
        }

        /* Final double bar — drawn at the right edge of the very last cell of the
           last row. Because the beat row now ends exactly where the staff line
           ends (W), the double bar always terminates flush with the staff line. */
        .beat-drop-zone.final-cell::after {
            content: '';
            position: absolute;
            right: 0; /* == staff line's right end */
            top: 0;
            bottom: 0;
            width: 7px;
            /* thin line + gap + thick line (thick flush with the end) */
            background: linear-gradient(90deg, var(--bar-ink, #333) 0 2px, transparent 2px 4px, var(--bar-ink, #333) 4px 7px);
        }

        /* Beat indicators inside white area */
        .beat-drop-zone::before {
            content: attr(data-beat);
            position: absolute;
            /* At the bottom of the (now scaling) cell — always below the notes. */
            bottom: 6px;
            /* Anchored to the beat ONSET (cell's left edge) so the number sits
               where the beat actually starts and notes line up under it. */
            left: 0;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #ddd;
            font-weight: 300;
            z-index: 0;
        }
        /* Each measure's first beat sits right after a bar line. The gap is PADDING
           (inside the cell), not margin — so the cell's box (and the beat-guide
           highlight) spans bar-line to bar-line and lines up with the bar lines,
           while the note + number are inset for breathing room. Same inset on
           every measure keeps cells equal width / bar lines stacked. */
        .beat-drop-zone[data-beat="1"] {
            padding-left: 14px;
        }
        /* Inset the notation + number by the padding (absolute children are
           positioned from the padding box, so they need the explicit offset). */
        .beat-drop-zone[data-beat="1"] .beat-notation {
            left: 14px; right: 0; width: auto;
        }
        .beat-drop-zone[data-beat="1"]::before {
            left: 14px;
        }

        .beat-drop-zone.drag-over {
            background: rgba(255, 107, 107, 0.12);
            /* Clear border around the target cell (inset so it doesn't shift layout). */
            box-shadow: inset 0 0 0 2px rgba(255, 107, 107, 0.7);
            border-radius: 4px;
        }
        /* (Beat number now rides ABOVE the drag preview — see buildDragImage — so it's
           never hidden under the finger; the cell just gets the border.) */

        .beat-drop-zone.filled {
            background: rgba(76, 175, 80, 0.1);
        }

        .beat-drop-zone.continuation {
            background: rgba(76, 175, 80, 0.1); /* Green instead of yellow */
        }

        .beat-drop-zone.revealed {
            background: rgba(52, 152, 219, 0.1);
        }

        .beat-notation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* A dropped rhythm PNG. Width is set inline as (beats * 100%) of one
           responsive beat cell, so it scales with the screen and spans its
           continuation beats. object-fit keeps the aspect ratio; object-position
           pins the noteheads onto the single staff line. */
        .placed-note {
            position: absolute;
            left: 0;
            /* width is set inline to (beats * 100%) to span the pattern's beats;
               assets are width-proportional to beats, so height (auto) is identical
               for every pattern at any screen size. Anchored left so inner notes
               align to their beats. */
            top: 44%;
            /* Nudge up just enough that the staff line clears the noteheads
               (the line cut through them when centered, worst when notes are
               small at 8+ bars). Stem still crosses the line; % scales with note
               size so the clearance holds at every zoom. */
            transform: translateY(-66%);
            height: auto;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
            z-index: 2;
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .feedback {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
        }

        .feedback.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
        }

        .feedback.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }

        .feedback.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
        }


        /* Tablet Layout */
        @media (max-width: 1024px) {
            .answer-staff {
                width: 95vw;
                max-width: 800px;
                padding: 15px 35px 15px 15px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                padding: 15px;
            }

            .rhythm-tile {
                min-height: 100px;
                padding: 0;
            }
        }

        /* Landscape orientation hint */
        @media (max-width: 768px) and (orientation: portrait) {
            .game-area::before {
                content: "Tip: Rotate to landscape for a better experience";
                display: block;
                text-align: center;
                background: rgba(255, 255, 255, 0.1);
                padding: 8px;
                border-radius: 8px;
                margin-bottom: 10px;
                font-size: 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        }

        /* Mobile Layout - Large phones and small tablets */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
                margin: 15px 0;
            }

            .answer-staff {
                width: 95vw;
                max-width: 700px;
                padding: 12px 25px 12px 12px;
            }

            /* .staff-container keeps its base responsive clamp height here. */

            .beat-drop-zone {
                min-height: 70px;
            }

            .beat-drop-zone::before {
                font-size: 1rem;
                bottom: 3px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 10px;
            }

            .rhythm-tile {
                min-height: 80px;
                padding: 0;
                font-size: 0.7rem;
            }

            .remove-btn {
                width: 20px;
                height: 20px;
                font-size: 10px;
                top: -10px;
                right: -10px;
            }

            /* Touch-friendly interactions */
            .rhythm-tile:active {
                transform: scale(0.98);
                background: rgba(255, 255, 255, 1);
            }

            .beat-drop-zone:active {
                background: rgba(76, 175, 80, 0.15);
            }
        }

        /* Small Mobile Phones */
        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.3rem;
                margin: 10px 0;
            }

            .answer-staff {
                width: 98vw;
                max-width: none;
                padding: 10px 20px 10px 10px;
                margin: 0 auto;
            }

            .staff-container {
                height: 90px;     /* per-row height (moved off .answer-staff) */
            }

            .beat-drop-zone {
                min-height: 60px;
            }

            .beat-drop-zone::before {
                font-size: 0.9rem;
                bottom: 2px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 8px;
            }

            .rhythm-tile {
                min-height: 70px;
                padding: 0;
                font-size: 0.65rem;
            }

            .remove-btn {
                width: 18px;
                height: 18px;
                font-size: 9px;
                top: -9px;
                right: -9px;
            }

            /* Smaller VexFlow notation on mobile */
            .beat-notation svg {
                transform: translateX(-50%) scale(1.1) !important;
            }
        }

        /* Very small phones */
        @media (max-width: 360px) {
            .answer-staff {
                width: 99vw;
                padding: 8px 15px 8px 8px;
            }

            .staff-container {
                height: 80px;     /* per-row height (moved off .answer-staff) */
            }

            .beat-drop-zone {
                min-height: 55px;
            }

            .beat-drop-zone::before {
                font-size: 0.8rem;
                bottom: 1px;
            }

            .rhythm-bank {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
                padding: 6px;
            }

            .rhythm-tile {
                min-height: 40px;
                font-size: 0.6rem;
            }

            /* Even smaller notation for tiny screens */
            .beat-notation svg {
                transform: translateX(-50%) scale(1.0) !important;
            }
        }

        /* Focus-layout toggles exist only on touch screens (shown in the mobile
           block below); desktop keeps everything inline. */
        .focus-only { display: none; }

        /* ============================================================
           MOBILE (touch) — single horizontal scrolling staff
           + rhythm bank pinned to the bottom as a strip. Orientation is
           driven by a body class (set in JS from innerW vs innerH) because
           the CSS `orientation` media feature is unreliable in emulators.
           ============================================================ */
        @media (pointer: coarse) and (max-width: 1400px) {
            .header { display: none; }                 /* reclaim vertical space */
            .measure-container { margin-bottom: 4px; } /* rows stack vertically; page scrolls */
            .answer-area { padding: 8px; }
            /* Compact staff: the desktop row is 140–210px tall with a big gap
               between the notes and the beat numbers. Shrink it hard on phones so
               more rows fit and notes/bar lines feel proportionally larger. */
            /* Responsive: phones ~94px, but TALLER on iPad where wider cells make
               the note glyphs bigger (a fixed height collided with the numbers). */
            .staff-container { height: clamp(94px, 10vw, 128px); }
            .staff-container + .staff-container { margin-top: 8px; }
            /* Staff line + notes + time sig together at 50%: the note glyph extends
               well below the line (notehead sits low in the glyph), so the notes
               have to come up enough that the glyph bottom clears the beat numbers,
               which stay put at the bottom. */
            .staff-line { top: 50%; }
            .placed-note { top: 50%; transform: translateY(-66%) scale(1.22); transform-origin: left center; }
            .answer-time-sig { top: 50%; font-size: 30px !important; }   /* was up to 62px */
            .answer-ts-inline .ts-stack { top: 50%; }
            .beat-drop-zone::before { font-size: 0.85rem; bottom: 4px; }  /* beat # near the line */
            /* Bar lines: a segment CENTERED on the staff line (equal above/below),
               not the full-height border which ran far above the line. */
            .beat-drop-zone.measure-end:not(.final-cell) { border-right: none; }
            .beat-drop-zone.measure-end:not(.final-cell)::after {
                content: ''; position: absolute; right: 0;
                top: 22%; bottom: 22%;          /* 22%..78% -> centered on 50% */
                width: 3px; background: var(--bar-ink, #333);
            }
            .beat-drop-zone.final-cell::after { top: 22%; bottom: 22%; }   /* center the final double bar too */
            /* Pin the bank to the bottom. It WRAPS into multiple rows and grows
               with the number of tiles (so all choices are visible), capped so it
               can't eat the whole screen — then it scrolls internally.
               !important overrides per-theme `position: relative` (suite-theme.css). */
            .rhythm-bank {
                position: fixed !important;
                /* Lifted off the very bottom edge so dragging a tile doesn't trigger
                   the iOS home-swipe / app-switcher gesture. Side insets float it. */
                left: 8px !important; right: 8px !important;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 16px) !important;
                z-index: 50;
                margin: 0; border-radius: 12px; padding: 7px 10px;
                background: rgba(18, 18, 24, 0.93);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.16);
                max-height: 46vh;            /* grow with tiles, but never past ~half the screen */
                overflow-y: auto;            /* scroll inside the bank if there are even more */
            }
            .rhythm-bank h3 { display: none; }
            .rhythm-tiles {
                flex-wrap: wrap;             /* multiple rows so every choice shows */
                overflow-x: visible;
                max-height: none;
                justify-content: center;
                gap: 8px;
                padding-bottom: 2px;
            }
            .rhythm-tile { width: 104px; flex: 0 0 104px; min-height: 60px; }
            /* padding-bottom is set in JS to the bank's live height (it varies with
               the tile count) so the last staff row never hides behind it. */
            .game-area { padding-top: 50px; padding-bottom: 96px; }   /* clear fixed slim bar + bank (JS refines) */
            /* Theme cosmetics that fight the controls on small screens */
            #themeSwitcher { display: none !important; }   /* was covering Speed/Bars */
            .dq-screws { display: none !important; }       /* corner bolts collided with tiles */

            /* ===== FOCUS LAYOUT: slim top bar (Play + Settings + Hints) =====
               Everything else collapses into dropdown panels so the staff + bank
               own the screen. */
            .focus-only { display: inline-flex !important; }   /* show the two toggles */
            /* FIXED (not sticky — sticky fails inside the flex column on iOS, so the
               bar scrolled away). Always pinned to the very top. */
            #soloHud {
                position: fixed !important; top: 0; left: 0; right: 0; z-index: 60;
                padding: 6px 8px; margin: 0;
                background: rgba(18, 18, 24, 0.95); backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.14);
            }
            /* !important beats the HUD's JS-injected base styles (added after this
               sheet, so equal specificity would otherwise win on source order). */
            #soloHud .solo-stats { display: none !important; }   /* -> Settings dropdown */
            #soloHud #soloMsg { display: none !important; }
            #soloHud .solo-actions { margin: 0 !important; gap: 6px; justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            /* Everyday controls (Speed, Groove) sit compactly in the bar; drop their
               labels to save room (the dropdown + progress bar are self-evident). */
            .solo-actions .bar-item { flex: 0 0 auto; gap: 4px; white-space: nowrap; }
            .solo-actions .bar-item > span { display: none; }
            /* Groove fills whatever space is left between Settings and the Theme icon. */
            .solo-actions .solo-stat.groove { flex: 1 1 auto !important; min-width: 90px !important; }
            .solo-actions .solo-stat.groove .solo-bar { flex: 1 1 auto !important; width: auto !important; max-width: none !important; }
            .solo-actions .icon-only { padding: 7px 9px; }
            /* Theme: palette icon at the far right (Groove's flex pushes it there) */
            #soloThemeToggle { margin-left: 0; flex: 0 0 auto; }
            body.theme-open #themeSwitcher {
                display: flex !important; flex-direction: column; gap: 6px;
                position: fixed; top: 52px; right: 6px; left: auto; z-index: 70;
                width: max-content;
                background: rgba(20, 20, 28, 0.97);
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 12px; padding: 12px;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
            }
            .solo-actions .solo-cfg,
            .solo-actions .solo-hints { display: none !important; }   /* metro/guide/fixit + hints out of the bar */
            /* Settings / Hints dropdown panel — sized to its CONTENT (not full width),
               anchored at the left under the toggles; capped so it can't overflow. */
            body.settings-open #soloHud .solo-stats,
            body.hints-open .solo-actions .solo-hints {
                display: flex !important; flex-direction: column; align-items: stretch; gap: 10px;
                position: fixed; top: 52px; left: 6px; right: auto; z-index: 70;
                width: max-content; max-width: calc(100vw - 12px);
                background: rgba(20, 20, 28, 0.97);
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 12px; padding: 14px;
                max-height: 72vh; overflow-y: auto;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
            }
            body.settings-open #soloHud .solo-stats .solo-stat { width: 100%; justify-content: space-between; gap: 14px; }
            body.settings-open #soloHud .solo-stats select { margin-left: 8px; padding: 6px; }
            body.hints-open .solo-actions .solo-hints .hints-label { opacity: 0.6; font-size: 0.78rem; letter-spacing: 0.08em; }
            body.hints-open .solo-actions .solo-hints .hint { justify-content: flex-start; }

            /* Portrait: block the cramped game and ask the user to rotate */
            body.app-portrait .game-area.active { display: none; }
            body.app-portrait .game-area.active ~ #rotateGate {
                display: flex;
                position: fixed; inset: 0; z-index: 9999;
                background: linear-gradient(140deg, #2d3436 0%, #16191a 100%);
                color: #fff;
                align-items: center; justify-content: center;
                text-align: center; padding: 28px;
            }
        }

        /* ===== Rotate gate styling (visibility handled above) ===== */
        #rotateGate { display: none; }
        #rotateGate .rotate-inner { max-width: 340px; }
        #rotateGate svg { width: 78px; height: 78px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 20px; }
        #rotateGate .rotate-title { font-size: 1.45rem; font-weight: 700; margin-bottom: 12px; }
        #rotateGate .rotate-sub { opacity: 0.72; font-size: 0.95rem; line-height: 1.45; }
    </style>
    <!-- Suite theme skins (cosmetic only — does not affect the notation engine) -->
    <link rel="stylesheet" href="suite-theme.css">
</head>
<body>
    <div class="header">
        <h1>Rhythm Dictation — Student</h1>
    </div>

    <!-- Login Form -->
    <div class="login-form" id="loginForm">
        <h2 style="text-align: center; margin-bottom: 20px;">Join Rhythm Session</h2>
        <div class="form-group">
            <label for="studentName">Your Name:</label>
            <input type="text" id="studentName" placeholder="Enter your name" value="Test Student" required>
        </div>
        <div class="form-group">
            <label for="roomCode">Room Code:</label>
            <input type="text" id="roomCode" placeholder="Enter room code" value="TEST123" required>
        </div>
        <button class="btn-login" id="joinBtn">Join Session</button>
        <div style="text-align:center;margin:14px 0 4px;opacity:.7;font-size:.85rem">— or —</div>
        <button class="btn-login" id="soloBtn" style="background:linear-gradient(45deg,#16c2b0,#0e9e8e)">Practice on your own</button>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="status-bar">
            <div>Connected to Room: <strong id="connectedRoom">-</strong></div>
            <div>Status: <span id="connectionStatus">Connected</span></div>
        </div>

        <!-- Answer staff on top (your work); rhythm bank below as the palette -->
        <div class="answer-area">
            <!-- label is the themed pill inside the staff ("Your Answer (N measures)") -->
            <div id="measureContainer">
                <!-- Measures will be populated by JavaScript -->
            </div>
            <div id="feedback"></div>
        </div>

        <div class="rhythm-bank">
            <h3>Rhythm Bank</h3>
            <div class="rhythm-tiles" id="rhythmTiles">
                <!-- Rhythm tiles will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Shown only on touch devices held in portrait while a game is active -->
    <div id="rotateGate">
        <div class="rotate-inner">
            <svg viewBox="0 0 64 64"><rect x="9" y="21" width="46" height="26" rx="4"/><path d="M22 16a14 14 0 0 1 23 2"/><path d="M45 10v8h-8"/></svg>
            <div class="rotate-title">Turn your device sideways</div>
            <div class="rotate-sub">Rhythm dictation needs landscape. If it doesn't rotate, switch off your device's rotation lock.</div>
        </div>
    </div>

    <!-- Orientation flag for the mobile layout / rotate gate -->
    <script>
        (function () {
            function updateOrientation() {
                document.body.classList.toggle('app-portrait', window.innerHeight > window.innerWidth);
            }
            window.addEventListener('resize', updateOrientation);
            window.addEventListener('orientationchange', updateOrientation);
            updateOrientation();
        })();
    </script>
    <script type="module" src="rhythm-student.js?v=20260627ag"></script>
    <script src="suite-theme.js"></script>
    <script src="solo-mode.js?v=20260627u"></script>
</body>
</html>
