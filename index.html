<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Dictation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(140deg, #2d3436 0%, #636e72 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        h1 { font-size: 2.4rem; margin-bottom: 6px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
        .sub { opacity: 0.7; margin-bottom: 42px; font-size: 1.05rem; }
        .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .card {
            width: 290px;
            min-height: 230px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            padding: 30px 26px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.32);
        }
        .card svg {
            width: 60px; height: 60px;
            fill: none; stroke: currentColor; stroke-width: 1.6;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .card .name { font-size: 1.5rem; font-weight: 700; }
        .card .tag { opacity: 0.72; font-size: 0.95rem; text-align: center; line-height: 1.35; }
    </style>
</head>
<body>
    <h1>Music Dictation</h1>
    <p class="sub">Choose a game</p>
    <div class="cards">
        <a class="card" href="rhythm-student.html">
            <svg viewBox="0 0 64 64"><path d="M22 46V15l28-6v31"/><circle cx="15" cy="46" r="6.5"/><circle cx="43" cy="40" r="6.5"/></svg>
            <span class="name">BeatQuest</span>
            <span class="tag">Rhythm dictation — hear it, build it, and check it across every meter.</span>
        </a>
        <a class="card" href="melodic.html">
            <svg viewBox="0 0 64 64"><path d="M10 38h7l4-19 6 30 5-24 4 13h11"/><path d="M52 24v19"/><circle cx="47" cy="43" r="5.5"/></svg>
            <span class="name">Melodic Dictation</span>
            <span class="tag">Hear a melody and write it back by ear.</span>
        </a>
    </div>
</body>
</html>
